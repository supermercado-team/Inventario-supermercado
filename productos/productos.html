<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Productos</title>
    <link rel="stylesheet" href="productos.css">
</head>
<body>

    <header>
        <h1>Sistema de Inventario - Productos</h1>
        <p>Registro, consulta y gestión de productos del supermercado.</p>
    </header>

    <main class="contenedor">
        <section class="tarjeta">
            <h2>Registrar producto</h2>

            <form id="formProducto">
                <input type="text" id="codigo" placeholder="Código del producto" required>
                <input type="text" id="nombre" placeholder="Nombre del producto" required>
                <input type="text" id="categoria" placeholder="Categoría" required>
                <input type="text" id="proveedor" placeholder="Proveedor" required>
                <input type="number" id="precio" placeholder="Precio unitario" required>
                <input type="number" id="stock" placeholder="Stock mínimo" required>

                <button type="submit">Guardar producto</button>
            </form>
        </section>

        <section class="tarjeta">
            <h2>Buscar producto</h2>
            <input type="text" id="busqueda" placeholder="Buscar por código o nombre">
        </section>

        <section class="tarjeta">
            <h2>Listado de productos</h2>

            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Proveedor</th>
                        <th>Precio</th>
                        <th>Stock mínimo</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos"></tbody>
            </table>
        </section>
    </main>

    <script src="productos.js"></script>
</body>
</html>
